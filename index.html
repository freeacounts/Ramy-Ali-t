<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمز الدخول</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* مربع الرمز */
.key-box{
  width:280px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 15px #38bdf8;
  position:relative;
  transition: all 0.3s ease;
}
.key-box.green{
  animation:greenGlow 1s infinite alternate;
}
@keyframes greenGlow{
  0%{box-shadow:0 0 15px #22c55e;}
  50%{box-shadow:0 0 30px #22c55e;}
  100%{box-shadow:0 0 50px #22c55e;}
}
.key-box.red{
  box-shadow:0 0 25px #ff5555,0 0 50px #ff5555AA,0 0 75px #ff5555;
  border:2px solid #ff5555;
  animation:shake 0.3s;
}
@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
.key-box input{
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  width:80%;
  margin-bottom:15px;
  text-align:center;
  font-size:16px;
  background:white;
  color:black;
}
.key-box button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}
.success-msg{
  color:#22c55e;
  margin-bottom:10px;
  font-weight:bold;
  display:none;
}
.error-msg{
  color:#ff5555;
  margin-top:10px;
  display:none;
}

/* العدّاد */
.countdown{
  display:none;
  position:relative;
  width:40px;
  height:40px;
  border-radius:50%;
  border:3px solid #22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:white;
  font-size:18px;
  margin:10px auto 0 auto;
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  0%{box-shadow:0 0 5px #22c55e;}
  100%{box-shadow:0 0 15px #22c55e;}
}

/* مربع رامي تحبني */
.ramy-box{
  width:300px;
  max-width:90%;
  background:rgba(17,24,39,0.9);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:white;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  border:6px solid;
  animation:rainbowBorder 3s linear infinite;
}

/* ألوان قوس قزح */
@keyframes rainbowBorder{
  0%{border-color:red;}
  14%{border-color:orange;}
  28%{border-color:yellow;}
  42%{border-color:green;}
  57%{border-color:blue;}
  71%{border-color:indigo;}
  85%{border-color:violet;}
  100%{border-color:red;}
}

/* أزرار نعم ولا */
.choice-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  font-size:20px;
  font-weight:bold;
  border:none;
  cursor:pointer;
  color:white;
  margin:0 20px;
  box-shadow:0 0 10px #38bdf8;
}
#yesBtn{background:#22c55e;}
#noBtn{background:#ff5555;}

/* واجهة النتيجة */
.result-box{
  width:300px;
  max-width:90%;
  background:rgba(17,24,39,0.95);
  padding:30px 20px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:white;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:none;
  border:6px solid;
  animation:rainbowBorder 3s linear infinite;
}

/* زر رجوع */
.back-btn{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 15px;
  background:linear-gradient(135deg,#38bdf8,#22c55e);
  border:none;
  border-radius:15px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  display:none;
  box-shadow:0 0 10px #38bdf8;
}

/* الألعاب النارية */
.firework{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  pointer-events:none;
}

/* سمايلات حزينه */
.sad{
  position:absolute;
  font-size:24px;
  pointer-events:none;
}

@media(max-width:768px){
  .key-box,.ramy-box,.result-box{width:90%;}
}
</style>
</head>
<body>

<div class="key-box" id="keyBox">
  <h2>أدخل الرمز</h2>
  <div class="success-msg" id="successMsg">تم دخول بنجاح</div>
  <input type="password" id="keyInput" placeholder="أدخل الرمز">
  <br>
  <button id="enterBtn" onclick="checkKey()">دخول</button>
  <div class="error-msg" id="errorMsg">رمز خاطئ!</div>
  <div class="countdown" id="countdown">3</div>
</div>

<div class="ramy-box" id="ramyBox">
  رامي تحبني
  <div style="margin-top:20px;">
    <button class="choice-btn" id="yesBtn">نعم</button>
    <button class="choice-btn" id="noBtn">لا</button>
  </div>
</div>

<div class="result-box" id="resultBox">
  النتيجة
</div>

<button class="back-btn" id="backBtn">رجوع</button>

<audio id="fireworkSound" src="https://www.soundjay.com/misc/sounds/firework-1.mp3"></audio>
<audio id="crySound" src="https://www.soundjay.com/human/sounds/crying-1.mp3"></audio>

<script>
const correctKey = "ramy";
const keyBox = document.getElementById("keyBox");
const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");
const countdown = document.getElementById("countdown");
const enterBtn = document.getElementById("enterBtn");
const ramyBox = document.getElementById("ramyBox");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const resultBox = document.getElementById("resultBox");
const backBtn = document.getElementById("backBtn");
const fireworkSound = document.getElementById("fireworkSound");
const crySound = document.getElementById("crySound");

let fireworkInterval, sadInterval;

function checkKey(){
  const input = document.getElementById("keyInput").value;
  if(input === correctKey){
    errorMsg.style.display="none";
    successMsg.style.display="block";
    keyBox.classList.add("green");
    enterBtn.style.display="none";
    // إظهار العدّاد
    countdown.style.display="flex";
    let count=3;
    countdown.innerText=count;
    let interval=setInterval(()=>{
      count--;
      if(count>0){
        countdown.innerText=count;
      }else{
        clearInterval(interval);
        countdown.style.display="none";
        successMsg.style.display="none";
        keyBox.style.display="none";
        ramyBox.style.display="block";
      }
    },1000);
  }else{
    errorMsg.style.display="block";
    keyBox.classList.add("red");
    setTimeout(()=>{ keyBox.classList.remove("red"); },500);
  }
}

// الألعاب النارية
function startFireworks(){
  fireworkSound.play();
  fireworkInterval=setInterval(()=>{
    const fw=document.createElement("div");
    fw.className="firework";
    fw.style.background=['red','orange','yellow','green','blue','violet'][Math.floor(Math.random()*6)];
    fw.style.left=Math.random()*100+"vw";
    fw.style.top=Math.random()*50+"vh";
    fw.style.width=(5+Math.random()*10)+"px";
    fw.style.height=(5+Math.random()*10)+"px";
    document.body.appendChild(fw);
    setTimeout(()=>fw.remove(),2000);
  },50);
}

// السمايلات الحزينه
function startSad(){
  crySound.play();
  sadInterval=setInterval(()=>{
    const s=document.createElement("div");
    s.className="sad";
    s.innerText="😭";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3000);
  },100);
}

function stopFireworks(){
  fireworkSound.pause();
  fireworkSound.currentTime=0;
  clearInterval(fireworkInterval);
  document.querySelectorAll('.firework').forEach(f=>f.remove());
}

function stopSad(){
  crySound.pause();
  crySound.currentTime=0;
  clearInterval(sadInterval);
  document.querySelectorAll('.sad').forEach(s=>s.remove());
}

yesBtn.onclick=function(){
  resultBox.innerText="اموت عليك هاي سيارة تاهو مني للكا 🚗";
  resultBox.style.display="block";
  ramyBox.style.display="none";
  setTimeout(()=>{ backBtn.style.display="block"; },2000);
  startFireworks();
}

noBtn.onclick=function(){
  resultBox.innerText="امشي لك الفگر 😭";
  resultBox.style.display="block";
  ramyBox.style.display="none";
  setTimeout(()=>{ backBtn.style.display="block"; },2000);
  startSad();
}

backBtn.onclick=function(){
  resultBox.style.display="none";
  backBtn.style.display="none";
  stopFireworks();
  stopSad();
  ramyBox.style.display="block";
}
</script>
</body>
</html>
